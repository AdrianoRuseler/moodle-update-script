<IfModule mod_ssl.c>
    <VirtualHost *:443>
        # https://www.prettifier.net/apache
        ServerAdmin webmaster@localhost

        DocumentRoot /var/www/html  #TODO: This needs to be investigated further.
        ServerName changetoservername

        DocumentRoot /var/www/html/public #TODO: This needs to be investigated further.
        <Directory /var/www/html/public>  #TODO: This needs to be investigated further.
            AllowOverride None
            Require all granted
            FallbackResource /r.php
        </Directory>

        DirectoryIndex index.php index.html

        # Available loglevels: trace8, ..., trace1, debug, info, notice, warn,
        # error, crit, alert, emerg.
        # It is also possible to configure the loglevel for particular
        # modules, e.g.
        #LogLevel info ssl:warn
        ErrorLog $ {
        APACHE_LOG_DI
        }
        /error.log
        CustomLog $ {
        APACHE_LOG_DI
        }
        /access.log combined

        # For most configuration files from conf-available/, which are
        # enabled or disabled at a global level, it is possible to
        # include a line for only one particular virtual host. For example the
        # following line enables the CGI configuration for this host only
        # after it has been globally disabled with "a2disconf".
        #Include conf-available/serve-cgi-bin.conf

        #   SSL Engine Switch:
        #   Enable/Disable SSL for this virtual host.
        SSLEngine on

        #   A self-signed (snakeoil) certificate can be created by installing
        #   the ssl-cert package. See
        #   /usr/share/doc/apache2/README.Debian.gz for more info.
        #   If both key and certificate are stored in the same file, only the
        #   SSLCertificateFile directive is needed.
        SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
        SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key


        <FilesMatch "\.(cgi|shtml|phtml|php)$">
            SSLOptions +StdEnvVars
        </FilesMatch>
        <Directory /usr/lib/cgi-bin>
            SSLOptions +StdEnvVars
        </Directory>

        # For Apache version 2.4.10 and above, use SetHandler to run PHP as a fastCGI process server
        # SetHandlerInsert

        # https://docs.moodle.org/501/en/Apache
        # The function slash arguments is required for various features
        # in Moodle to work correctly, as described in Using slash arguments.
        AcceptPathInfo On

        # This enables missing files to be themed by Moodle
        ErrorDocument 404 /error/index.php

        # This sends any 403 from apache through to the same page, but also
        # overrides the http status with 404 instead for better security.
        ErrorDocument 403 /error/index.php?code=404

        # Hiding internal paths
        RewriteEngine On

        RewriteRule "(\/vendor\/)" - [L,R=404]
        RewriteRule "(\/node_modules\/)" - [L,R=404]
        RewriteRule "(^|/)\.(?!well-known\/)" - [L,R=404]
        RewriteRule "(composer\.json)" - [L,R=404]
        RewriteRule "(\.lock)" - [L,R=404]
        RewriteRule "(\/environment.xml)" - [L,R=404]
        RewriteRule "(\/lib\/classes)" - [L,R=404]
        RewriteRule "(\/install.xml)" - [L,R=404]
        RewriteRule "(\/README)" - [L,R=404]
        RewriteRule "(\/readme)" - [L,R=404]
        RewriteRule "(\/moodle_readme)" - [L,R=404]
        RewriteRule "(\/upgrade\.txt)" - [L,R=404]
        RewriteRule "(phpunit\.xml\.dist)" - [L,R=404]
        RewriteRule "(\/tests\/behat\/)" - [L,R=404]
        RewriteRule "(\/fixtures\/)" - [L,R=404]
        RewriteRule "(\/upgrade\.txt|UPGRADING\.md|UPGRADING\-CURRENT\.md)" - [L,R=404]


    </VirtualHost>
</IfModule>

# vim: syntax=apache ts=4 sw=4 sts=4 sr noet

